<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="dark">
    <meta
      name="description"
      content="Monocular Depth is a browser-based artwork exploring how depth and space can emerge through adaptation, motion, and perception."
    >
    <title>Monocular Depth</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main aria-label="Monocular Depth interactive artwork">
      <canvas id="depth-field" aria-hidden="true"></canvas>
    </main>

    <noscript>
      <p class="noscript">Monocular Depth needs JavaScript to draw its perceptual field.</p>
    </noscript>

    <script src="main.js" defer></script>
  </body>
</html>
